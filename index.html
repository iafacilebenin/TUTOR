
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAÎTRE D'ÉTUDES - 1er Maître d'Études IA au Bénin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --benin-green: #008751;
            --benin-yellow: #FCD116;
            --benin-red: #E8112D;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top left, #0a210f, #0d0f0d);
            margin: 0;
            padding: 0;
        }
        h1, h2, h3, .font-heading { font-family: 'Outfit', sans-serif; }
        
        .glass-panel {
            background: rgba(20, 25, 20, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .benin-gradient-text {
            background: linear-gradient(to right, var(--benin-green), var(--benin-yellow), var(--benin-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        .hero-glow {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(0, 135, 81, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .message-user {
            background: linear-gradient(135deg, #006b40 0%, #008751 100%);
            box-shadow: 0 10px 20px -5px rgba(0, 135, 81, 0.3);
        }

        .message-ai {
            background: rgba(45, 55, 45, 0.6);
            border-left: 4px solid var(--benin-yellow);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .float-anim { animation: float 6s ease-in-out infinite; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(252, 209, 22, 0.2); border-radius: 10px; }
    </style>
